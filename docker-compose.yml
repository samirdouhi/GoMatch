version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pfa-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "${MSSQL_PID}"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - pfa-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  gateway:
    build:
      context: ./backend/Gateway/ApiGateway
    container_name: pfa-gateway
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"
    depends_on:
      authservice:
        condition: service_started
      businessservice:
        condition: service_started
      profileservice:
        condition: service_started
      recoservice:
        condition: service_started
      eventmatchservice:
        condition: service_started
      statsservice:
        condition: service_started
      cultureservice:
        condition: service_started
    networks:
      - pfa-network

  authservice:
    build:
      context: ./backend/Services/Auth/AuthService/AuthService
    container_name: pfa-auth
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GoMatchAuthDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
    ports:
      - "5001:8080"
    networks:
      - pfa-network

  businessservice:
    build:
      context: ./backend/Services/BusinessService
    container_name: pfa-business
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GoMatchBusinessDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
    ports:
      - "5002:8080"
    networks:
      - pfa-network

  profileservice:
    build:
      context: ./backend/Services/ProfileService/ProfileService
    container_name: pfa-profile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GoMatchProfileDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
    ports:
      - "5003:8080"
    networks:
      - pfa-network

  recoservice:
    build:
      context: ./backend/Services/RecoService
    container_name: pfa-reco
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: "${JWT_KEY}"
    ports:
      - "5004:8080"
    networks:
      - pfa-network

  eventmatchservice:
    build:
      context: ./backend/Services/EventMatchService
    container_name: pfa-eventmatch
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GoMatchEventMatchDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
    ports:
      - "5005:8080"
    networks:
      - pfa-network

  statsservice:
    build:
      context: ./backend/Services/StatsService
    container_name: pfa-stats
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GoMatchStatsDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
    ports:
      - "5006:8080"
    networks:
      - pfa-network

  cultureservice:
    build:
      context: ./backend/Services/CultureService
    container_name: pfa-culture
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: "sqlsrv://sa:${SA_PASSWORD}@sqlserver:1433/GoMatchCultureDb?TrustServerCertificate=true"
    ports:
      - "5007:80"
    networks:
      - pfa-network

  frontend:
    build:
      context: ./frontend
    container_name: pfa-frontend
    depends_on:
      gateway:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:5000"
    ports:
      - "3000:3000"
    networks:
      - pfa-network

volumes:
  sql_data:

networks:
  pfa-network: